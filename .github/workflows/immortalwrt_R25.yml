name: immortalwrt_x86_R25_12

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      ssh:
        description: "ssh"
        required: false
        default: "false"

env:
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-24.04
    if: github.event.repository.owner.id == github.event.sender.id

    name: 构建固件 - ${{matrix.target}}
    strategy:
      fail-fast: false
      matrix:
        target: [immortalwrt_r25]

    steps:
      - name: 🧹 清理磁盘空间
        uses: sbwml/actions@free-disk

      - name: 🧱 初始化编译环境
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          echo "📦 安装编译依赖..."
          sudo bash -c 'bash <(curl -sL https://build-scripts.immortalwrt.org/init_build_environment.sh)'
          sudo -E apt -yqq install dos2unix
          sudo -E apt -yqq install libfuse-dev
          sudo -E apt -yqq autoremove --purge
          sudo -E apt -yqq autoclean
          sudo -E apt -yqq clean
          sudo -E systemctl daemon-reload
          sudo timedatectl set-timezone "$TZ"

      - name: 🧾 拉取代码
        uses: actions/checkout@v4

      - name: 📅 获取当前时间
        id: date
        run: |
          echo "date=$(date +'%Y.%m.%d-%H%M')" >> $GITHUB_ENV
          echo "date2=$(date +'%m/%d %Y')" >> $GITHUB_ENV
          echo "date3=$(date +'%m.%d')" >> $GITHUB_ENV
          echo "VERSION=$(date +'%m.%d')" >> $GITHUB_ENV

      - name: 📦 克隆源代码
        env:
          REPO_URL: https://github.com/immortalwrt/immortalwrt
          REPO_BRANCH: openwrt-25.12
        run: |
          git clone --depth 1 $REPO_URL -b $REPO_BRANCH openwrt

      - name: 💾 扩展编译磁盘空间
        run: |
          sudo mkdir -p -m 777 /mnt/openwrt/dl /mnt/openwrt/staging_dir /mnt/openwrt/build_dir
          ln -sf /mnt/openwrt/dl openwrt/dl
          ln -sf /mnt/openwrt/staging_dir openwrt/staging_dir
          ln -sf /mnt/openwrt/build_dir openwrt/build_dir
          df -h

      - name: 🔄 更新Feeds
        working-directory: ./openwrt
        run: |
          echo "📝 添加自定义软件源到 feeds.conf.default..."
          echo "src-git nikki https://github.com/nikkinikki-org/OpenWrt-nikki.git;main" >> feeds.conf.default

          echo "📦 克隆自定义包仓库（lucky 作为本地包）..."
          git clone --depth 1 https://github.com/gdy666/luci-app-lucky.git package/lucky || {
            echo "❌ lucky 仓库克隆失败"
            exit 1
          }

          echo "🔄 更新软件源（包括新添加的 nikki feed）..."
          ./scripts/feeds update -a || {
            echo "❌ 软件源更新失败，重试一次..."
            sleep 5
            ./scripts/feeds update -a
          }

          echo "🔧 替换 golang 为 1.26 版本..."
          rm -rf feeds/packages/lang/golang
          git clone --depth 1 https://github.com/kenzok8/golang -b 1.26 feeds/packages/lang/golang

          echo "📦 安装所有软件包..."
          ./scripts/feeds install -a || {
            echo "⚠️ 批量安装失败，尝试逐个安装核心包..."
            ./scripts/feeds install -p packages -a
            ./scripts/feeds install -p luci -a
            echo "✅ 核心包安装完成"
          }

          echo "📦 单独安装 nikki feed 包（确保安装）..."
          ./scripts/feeds install -p nikki -a || {
            echo "⚠️ nikki feed 安装失败，但不中断构建"
          }

      - name: 🛠 修改默认配置
        working-directory: ./openwrt
        run: |
          sed -i 's/192.168.1.1/10.159.1.66/g' package/base-files/files/bin/config_generate
          sed -i 's/ImmortalWrt/LuckyWRT/g' package/base-files/files/bin/config_generate

      - name: ⚙️ 加载自定义配置
        run: |
          CONFIG_FILE="${{matrix.target}}.config"
          if [ -f "$CONFIG_FILE" ]; then
            echo "✅ 发现配置文件：$CONFIG_FILE"
            cp "$CONFIG_FILE" openwrt/.config
          else
            echo "❌ 未找到配置文件：$CONFIG_FILE"
            exit 1
          fi

      - name: 📋 应用配置（make defconfig）
        working-directory: ./openwrt
        run: |
          make defconfig
          echo "📂 最终配置文件内容如下："
          head -n 20 .config

      - name: 📥 预下载编译依赖
        working-directory: ./openwrt
        run: |
          make download -j$(nproc)
          find dl -size -1024c -exec rm -f {} \;

      - name: 🧩 编译固件
        working-directory: ./openwrt
        run: |
          echo "📊 编译前磁盘空间："
          df -h
          echo "🔨 开始编译固件（$(nproc) 核心线程）..."
          make -j$(nproc) || {
            echo "⚠️ 并行编译失败，切换到单线程详细模式..."
            echo "📊 当前磁盘空间："
            df -h
            echo "📋 开始单线程编译并输出详细日志..."
            make -j1 V=s
          }

      - name: 📤 上传编译日志（如果失败）
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: build-logs-${{ env.date3 }}-${{matrix.target}}
          path: |
            openwrt/build.log
            openwrt/build_verbose.log
            openwrt/.config
          retention-days: 7

      - name: 📂 整理固件文件
        id: organize
        if: env.UPLOAD_FIRMWARE == 'true' && !cancelled()
        run: |
          mkdir firmware
          mv -f openwrt/bin/targets/*/*/{*combined*,*sysupgrade*} ./firmware/ 2>/dev/null || true
          if [ -f openwrt/.config ]; then
            cp openwrt/.config ./firmware/${{matrix.target}}.config
          else
            echo "⚠️ 警告：未找到 openwrt/.config 文件，跳过配置文件保存"
          fi
          cd firmware
          echo "FIRMWARE=$PWD" >> $GITHUB_ENV
          echo "status=success" >> $GITHUB_OUTPUT

      - name: ☁️ 上传固件
        uses: actions/upload-artifact@v4
        if: steps.organize.outputs.status == 'success' && !cancelled()
        with:
          name: ${{ env.date3 }} _${{matrix.target}}
          path: ${{ env.FIRMWARE }}

      - name: 🏷 生成发布标签
        id: tag
        if: env.UPLOAD_RELEASE == 'true' && !cancelled()
        run: |
          touch release.txt
          echo "OpenWrt firmware for ${{matrix.target}}" >> release.txt
          echo "Build date: ${{ env.date2 }}" >> release.txt
          echo "status=success" >> $GITHUB_OUTPUT

      - name: 🚀 上传到 Release
        uses: softprops/action-gh-release@v1
        if: steps.tag.outputs.status == 'success' && !cancelled()
        env:
          GITHUB_TOKEN: ${{ secrets.REPO_TOKEN }}
        with:
          files: "${{ env.FIRMWARE }}/*"
          name: ${{ env.date2 }} ${{matrix.target}}
          tag_name: ${{ env.date }}_${{matrix.target}}
          body_path: release.txt

      - name: 🧹 删除旧的 Workflow 记录
        uses: Mattraks/delete-workflow-runs@v2
        with:
          retain_days: 1
          keep_minimum_runs: 0

      - name: 🗑 清理旧的 Release
        uses: dev-drprasad/delete-older-releases@v0.3.0
        if: env.UPLOAD_RELEASE == 'true' && !cancelled()
        with:
          keep_latest: 6
          delete_tags: true
        env:
          GITHUB_TOKEN: ${{ secrets.REPO_TOKEN }}
